<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Preencher Array (Simples)</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div class="container">
		<div class="card">

			<h2 style="color:aliceblue;">Cadastro de Produtos</h2>
			<label>
				<input class="input" id='in1' placeholder="Produto">
			</label>
			<label>
				<input class="input" id='in2' type="number" step="0.01" placeholder="Preço (R$)">
			</label>
			<label>
				<input class="input" id='in3' type="number" step="1" placeholder="Quantidade">
			</label>

			<button onclick='Adicionar()'>Adicionar produto</button>
			<button onclick='Tabela()'>Listar produtos</button>
			<button onclick='Resumo()'>Resumo</button>
			<button onclick='Limpar()'>Limpar tudo</button>

			<label>
				<input class="input" id='indice' type="number" step="0" placeholder="Remover por índice">
			</label>
			<button class="remove", onclick='RemoveIn()'>Remover</button>
		</div>

		<div class="card1">
			
			<div id="titulo"></div>

			<div id="containerTabela" style="display: none;">
				<table border='0'>
					<thead>
						<tr>
							<th>Índice</th>
							<th>Produto</th>
							<th>Preço</th>
							<th>Quantidade</th>
							<th>Subtotal</th>
						</tr>
					</thead>
					<tbody id="corpoTabela"></tbody>
				</table>
			</div>
		</div>
	</div>

	<script src="script.js"></script>
</body>

</html>
